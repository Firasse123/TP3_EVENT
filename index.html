<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat de Classe</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .container { width: 500px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .header { background: #4f46e5; color: white; padding: 16px; text-align: center; font-size: 18px; font-weight: bold; }
    .users { background: #eef2ff; padding: 8px 16px; font-size: 12px; color: #4f46e5; min-height: 30px; }
    .messages { height: 380px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .message { background: #f3f4f6; padding: 10px 14px; border-radius: 10px; max-width: 85%; }
    .message.mine { background: #4f46e5; color: white; align-self: flex-end; }
    .message .author { font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.7; }
    .message .text { font-size: 14px; }
    .message .time { font-size: 10px; opacity: 0.5; margin-top: 4px; }
    .reactions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .reaction-btn { background: #e5e7eb; border: none; border-radius: 20px; padding: 2px 8px; cursor: pointer; font-size: 12px; }
    .reaction-btn:hover { background: #d1d5db; }
    .typing { padding: 4px 16px; font-size: 12px; color: #9ca3af; min-height: 20px; }
    .input-area { padding: 12px 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; }
    .input-area input { flex: 1; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
    .input-area button { background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: 14px; }
    .join-screen { padding: 32px; text-align: center; }
    .join-screen input { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none; }
    .join-screen button { width: 100%; background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 12px; cursor: pointer; font-size: 16px; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">💬 Chat de Classe</div>

  <!-- Écran de connexion -->
  <div class="join-screen" id="joinScreen">
    <h3 style="margin-bottom:16px;color:#4f46e5">Rejoindre le chat</h3>
    <input type="text" id="usernameInput" placeholder="Ton prénom..."/>
    <button onclick="joinChat()">Rejoindre →</button>
  </div>

  <!-- Écran de chat -->
  <div id="chatScreen" class="hidden">
    <div class="users" id="usersList">Connectés : </div>
    <div class="messages" id="messages"></div>
    <div class="typing" id="typingIndicator"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Écrire un message..."/>
      <button onclick="sendMessage()">Envoyer</button>
    </div>
  </div>
</div>

<script>
  const socket = io('http://localhost:3000');
  let username = '';
  const emojis = ['👍', '❤️', '😂', '😮', '😢'];

  function joinChat() {
    username = document.getElementById('usernameInput').value.trim();
    if (!username) return;
    socket.emit('join', username);
    document.getElementById('joinScreen').classList.add('hidden');
    document.getElementById('chatScreen').classList.remove('hidden');
  }

  function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content) return;
    socket.emit('sendMessage', { content, author: username });
    socket.emit('stopTyping', username);
    input.value = '';
  }

  function react(messageId, emoji) {
    socket.emit('react', { messageId, emoji, author: username });
  }

  function renderMessage(msg) {
    const div = document.createElement('div');
    div.className = `message ${msg.author === username ? 'mine' : ''}`;
    div.id = `msg-${msg.id}`;

    const reactions = emojis.map(e =>
      `<button class="reaction-btn" onclick="react('${msg.id}', '${e}')">${e}</button>`
    ).join('');

    const reactionCounts = msg.reactions.reduce((acc, r) => {
      acc[r.emoji] = (acc[r.emoji] || 0) + 1;
      return acc;
    }, {});

    const reactionDisplay = Object.entries(reactionCounts)
      .map(([e, count]) => `<span style="background:#e5e7eb;padding:2px 6px;border-radius:12px;font-size:12px">${e} ${count}</span>`)
      .join('');

    div.innerHTML = `
      <div class="author">${msg.author}</div>
      <div class="text">${msg.content}</div>
      <div class="time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
      <div class="reactions" id="reactions-${msg.id}">
        ${reactions}
        <span id="counts-${msg.id}">${reactionDisplay}</span>
      </div>
    `;
    return div;
  }

  // écoute les messages précédents à la connexion
  socket.on('previousMessages', (messages) => {
    messages.forEach(msg => {
      document.getElementById('messages').appendChild(renderMessage(msg));
    });
  });

  // écoute les nouveaux messages
  socket.on('newMessage', (msg) => {
    document.getElementById('messages').appendChild(renderMessage(msg));
    document.getElementById('messages').scrollTop = 999999;
  });

  // écoute les mises à jour de réactions
  socket.on('messageUpdated', (msg) => {
    const reactionCounts = msg.reactions.reduce((acc, r) => {
      acc[r.emoji] = (acc[r.emoji] || 0) + 1;
      return acc;
    }, {});
    const display = Object.entries(reactionCounts)
      .map(([e, count]) => `<span style="background:#e5e7eb;padding:2px 6px;border-radius:12px;font-size:12px">${e} ${count}</span>`)
      .join('');
    const el = document.getElementById(`counts-${msg.id}`);
    if (el) el.innerHTML = display;
  });

  // écoute les utilisateurs connectés
  socket.on('userJoined', (data) => {
    document.getElementById('usersList').textContent =
      'Connectés : ' + data.connectedUsers.join(', ');
  });

  socket.on('userLeft', (data) => {
    document.getElementById('usersList').textContent =
      'Connectés : ' + data.connectedUsers.join(', ');
  });

  // écoute l'indicateur de frappe
  socket.on('userTyping', (data) => {
    document.getElementById('typingIndicator').textContent =
      `${data.username} est en train de taper...`;
  });

  socket.on('userStoppedTyping', () => {
    document.getElementById('typingIndicator').textContent = '';
  });

  // détecte la frappe
  document.getElementById('messageInput')?.addEventListener('input', () => {
    socket.emit('typing', username);
    clearTimeout(window.typingTimeout);
    window.typingTimeout = setTimeout(() => {
      socket.emit('stopTyping', username);
    }, 1500);
  });

  // envoyer avec Entrée
  document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
</body>
</html>
